include:
  - project: 'vera-studio/ci-templates'
    ref: release/1.13
    file:
      - 'common.yml'
      - 'python-jobs.yml'
      - 'code-review.yml'

stages:
  - review
  - lint
  - test
  - paper
  - package
  - research

default:
  tags:
    - docker-host

ruff:
  extends: .lint-ruff
  stage: lint

pytest:
  extends: .python-base
  stage: test
  before_script:
    - !reference [.python-base, before_script]
    - uv pip install pytest
  script:
    - python -m pytest -q
    - python -m compileall src

.paper-pdf-base:
  extends: .python-base
  stage: paper
  before_script:
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      latexmk
      lmodern
      texlive-fonts-recommended
      texlive-latex-base
      texlive-latex-extra
      texlive-latex-recommended
      texlive-pictures
    - rm -rf /var/lib/apt/lists/*
    - !reference [.python-base, before_script]

paper-pdf:conjecture:
  extends: .paper-pdf-base
  script:
    - cd paper/conjecture
    - latexmk -pdf -interaction=nonstopmode -halt-on-error preprint.tex
  artifacts:
    paths:
      - paper/conjecture/preprint.pdf
      - paper/conjecture/preprint.bbl
    expire_in: 30 days

paper-pdf:methodology:
  extends: .paper-pdf-base
  rules:
    - exists:
        - paper/methodology/preprint.tex
  script:
    - cd paper/methodology
    - latexmk -pdf -interaction=nonstopmode -halt-on-error preprint.tex
  artifacts:
    paths:
      - paper/methodology/preprint.pdf
      - paper/methodology/preprint.bbl
    expire_in: 30 days

.publication-bundle-base:
  extends: .python-base
  stage: package
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - rm -rf /var/lib/apt/lists/*
    - !reference [.python-base, before_script]
  artifacts:
    paths:
      - dist/publication/*-zenodo.zip
      - dist/publication/*-arxiv-source.zip
      - dist/publication/*/release_manifest.json
      - dist/publication/*/RELEASE_MANIFEST.txt
    expire_in: 90 days

publication-bundle:conjecture:
  extends: .publication-bundle-base
  needs:
    - job: paper-pdf:conjecture
      artifacts: true
  script:
    - python3 scripts/build_publication_bundle.py --paper conjecture --allow-dirty
  artifacts:
    name: "axiom-explorer-conjecture-bundle-${CI_COMMIT_SHORT_SHA}"

publication-bundle:methodology:
  extends: .publication-bundle-base
  rules:
    - exists:
        - paper/methodology/preprint.tex
  needs:
    - job: paper-pdf:methodology
      artifacts: true
  script:
    - python3 scripts/build_publication_bundle.py --paper methodology --allow-dirty
  artifacts:
    name: "axiom-explorer-methodology-bundle-${CI_COMMIT_SHORT_SHA}"

# Manual job to run a research phase end-to-end and persist outputs as artifacts.
research:phase:
  extends: .python-base
  stage: research
  rules:
    - if: $RESEARCH_PHASE
      when: manual
  before_script:
    - !reference [.python-base, before_script]
    - uv pip install -e ".[dev]"
  script:
    - python -m axiom_explorer.run_phase "$RESEARCH_PHASE"
  artifacts:
    paths:
      - "research/${RESEARCH_PHASE}*/output/"
      - "data/${RESEARCH_PHASE}*/"
    expire_in: 30 days
    when: always
